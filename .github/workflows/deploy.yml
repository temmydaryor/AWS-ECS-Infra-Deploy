name: Deploy Network and ECS Stack
on:
  push:
    branches:
      - master
jobs:
  deploy:   
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ca-central-1

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file templates/network-stack-infra.yaml \
            --stack-name network-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ca-central-1
      - name: Deploy ECS Stack
        run: |
          aws cloudformation deploy \
            --template-file templates/ecs-stack.yaml \
            --stack-name ecs-app-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ca-central-1
            --parameter-overrides \
              VPCId=$(aws cloudformation describe-stacks --stack-name network-stack --region ca-central-1 --query "Stacks[0].Outputs[?OutputKey=='VPCId'].OutputValue" --output text) \
              PublicSubnet1Id=$(aws cloudformation describe-stacks --stack-name network-stack --region ca-central-1 --query "Stacks[0].Outputs[?OutputKey=='PublicSubnet1Id'].OutputValue" --output text) \
              PublicSubnet2Id=$(aws cloudformation describe-stacks --stack-name network-stack --region ca-central-1 --query "Stacks[0].Outputs[?OutputKey=='PublicSubnet2Id'].OutputValue" --output text) \
              PrivateSubnet1Id=$(aws cloudformation describe-stacks --stack-name network-stack --region ca-central-1 --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet1Id'].OutputValue" --output text) \
              PrivateSubnet2Id=$(aws cloudformation describe-stacks --stack-name network-stack --region ca-central-1 --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet2Id'].OutputValue" --output text)
          
